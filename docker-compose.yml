# Run the Sèvo brain as a persistent microservice.
#   docker compose up --build         (or: make demo-docker)
#   ./scripts/smoke_test.sh            # once it is healthy
#
# The image is built ONLY from committed sources (pyproject, src, README,
# LICENSE, NOTICE — see Dockerfile); it depends on no local uncommitted state.
# The container starts from a NAÏVE brain and persists its learned state only to
# the `sevo-state` volume mounted at /data (the single recommended state path,
# $SEVO_STATE_DIR). The demo teaches, then save/loads to /data/brain.json.
services:
  sevo:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - sevo-state:/data            # brain state persists across restarts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  sevo-state:
